<!DOCTYPE html>
<html lang="en" ng-app="KeyneticApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keynetic Assignment - Products & Discounts Manager</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: 700; }
        .page-card { border: 0; border-radius: 14px; box-shadow: 0 8px 24px rgba(0,0,0,.08); }
        .price-final { color: #198754; font-weight: 700; }
        .login-wrap { min-height: calc(100vh - 100px); display: flex; align-items: center; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#/products">Keynetic Manager</a>
            <div class="navbar-nav ms-auto" ng-controller="NavCtrl">
                <a class="nav-link" href="#/login" ng-if="!auth.isAuthenticated()">Login</a>
                <a class="nav-link" href="#/products" ng-if="auth.isAuthenticated()">Products</a>
                <a class="nav-link" href="#/discounts" ng-if="auth.isAuthenticated()">Discounts</a>
                <a class="nav-link" href="#/categories" ng-if="auth.isAuthenticated()">Categories</a>
                <a href="" class="nav-link" ng-if="auth.isAuthenticated()" ng-click="logout()">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div ng-view></div>
    </div>

    <script>
        var app = angular.module('KeyneticApp', ['ngRoute']);

        app.config(['$routeProvider', '$locationProvider', function($routeProvider, $locationProvider) {
            $locationProvider.hashPrefix('');

            $routeProvider
                .when('/login', {
                    template: `
                        <div class="login-wrap">
                            <div class="row justify-content-center w-100">
                                <div class="col-md-6 col-lg-4">
                                    <div class="card page-card">
                                        <div class="card-body p-4 p-md-5">
                                            <div class="text-center mb-4">
                                                <i class="fas fa-user-circle fa-3x text-primary mb-3"></i>
                                                <h3>Login</h3>
                                                <p class="text-muted mb-0">Use seeded user credentials</p>
                                            </div>
                                            <form ng-submit="login()">
                                                <div class="mb-3">
                                                    <label class="form-label">Email</label>
                                                    <input type="email" class="form-control" ng-model="email" required>
                                                </div>
                                                <div class="mb-3">
                                                    <label class="form-label">Password</label>
                                                    <input type="password" class="form-control" ng-model="password" required>
                                                </div>
                                                <button type="submit" class="btn btn-primary w-100" ng-disabled="loading">
                                                    <span ng-if="!loading">Login</span>
                                                    <span ng-if="loading">Logging in...</span>
                                                </button>
                                            </form>
                                            <div class="alert alert-danger mt-3" ng-if="error">{{error}}</div>
                                            <div class="alert alert-success mt-3" ng-if="success">{{success}}</div>
                                            <div class="small text-muted mt-3">admin@admin.com / password</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `,
                    controller: 'LoginCtrl'
                })
                .when('/products', {
                    template: `
                        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
                            <div>
                                <h2 class="mb-1">Products</h2>
                                <p class="text-muted mb-0">Products listing page</p>
                            </div>
                            <input type="text" class="form-control" style="max-width:280px" placeholder="Search products" ng-model="search">
                        </div>
                        <div ng-if="loading" class="text-center py-5">Loading products...</div>
                        <div class="alert alert-danger" ng-if="error">{{error}}</div>
                        <div class="row" ng-if="!loading">
                            <div class="col-md-4 mb-4" ng-repeat="product in products | filter:search">
                                <div class="card page-card h-100">
                                    <div class="card-body">
                                        <h5>{{product.name}}</h5>
                                        <p class="text-muted">{{product.description || 'No description available'}}</p>
                                        <p class="mb-1"><strong>Price:</strong> ₹{{product.price}}</p>
                                        <p class="price-final mb-0">Final Price: ₹{{product.final_price || product.price}}</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `,
                    controller: 'ProductsCtrl'
                })
                .when('/discounts', {
                    template: `
                        <div class="mb-4">
                            <h2 class="mb-1">Discounts</h2>
                            <p class="text-muted mb-0">Discounts listing page</p>
                        </div>
                        <div ng-if="loading" class="text-center py-5">Loading discounts...</div>
                        <div class="alert alert-danger" ng-if="error">{{error}}</div>
                        <div class="row" ng-if="!loading">
                            <div class="col-md-4 mb-4" ng-repeat="discount in discounts">
                                <div class="card page-card h-100">
                                    <div class="card-body">
                                        <h5>{{discount.title}}</h5>
                                        <p class="mb-1"><strong>Type:</strong> {{discount.type}}</p>
                                        <p class="mb-0"><strong>Value:</strong> {{discount.value}}</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `,
                    controller: 'DiscountsCtrl'
                })
                .when('/categories', {
                    template: `
                        <div class="mb-4">
                            <h2 class="mb-1">Categories</h2>
                            <p class="text-muted mb-0">Categories with nested subcategories</p>
                        </div>
                        <div ng-if="loading" class="text-center py-5">Loading categories...</div>
                        <div class="alert alert-danger" ng-if="error">{{error}}</div>
                        <div class="card page-card" ng-if="!loading">
                            <div class="card-body">
                                <ul class="mb-0">
                                    <li ng-repeat="category in categories" class="mb-3">
                                        <strong>{{category.name}}</strong>
                                        <ul class="mt-2" ng-if="category.children && category.children.length">
                                            <li ng-repeat="child in category.children">{{child.name}}</li>
                                        </ul>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    `,
                    controller: 'CategoriesCtrl'
                })
                .otherwise({ redirectTo: '/login' });
        }]);

        app.factory('AuthService', ['$http', '$window', '$location', function($http, $window, $location) {
            var auth = {};
            auth.apiUrl = '/api';
            auth.token = $window.localStorage.getItem('token') || null;

            auth.login = function(email, password) {
                return $http.post(auth.apiUrl + '/login', {
                    email: email,
                    password: password
                }, {
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    }
                }).then(function(response) {
                    auth.token = response.data.token;
                    $window.localStorage.setItem('token', auth.token);
                    return response.data;
                });
            };

            auth.logout = function() {
                $window.localStorage.removeItem('token');
                auth.token = null;
                $location.path('/login');
            };

            auth.isAuthenticated = function() {
                return !!auth.token;
            };

            auth.getHeaders = function() {
                return {
                    'Authorization': 'Bearer ' + auth.token,
                    'Accept': 'application/json'
                };
            };

            return auth;
        }]);

        app.run(['$rootScope', '$location', 'AuthService', function($rootScope, $location, AuthService) {
            $rootScope.auth = AuthService;
            $rootScope.$on('$routeChangeStart', function(event) {
                var path = $location.path() || '/login';
                if (path !== '/login' && !AuthService.isAuthenticated()) {
                    event.preventDefault();
                    $location.path('/login');
                }
            });
        }]);

        app.controller('NavCtrl', ['$scope', 'AuthService', function($scope, AuthService) {
            $scope.auth = AuthService;
            $scope.logout = function() {
                AuthService.logout();
            };
        }]);

        app.controller('LoginCtrl', ['$scope', 'AuthService', '$location', function($scope, AuthService, $location) {
            $scope.email = 'admin@admin.com';
            $scope.password = 'password';
            $scope.loading = false;

            if (AuthService.isAuthenticated()) {
                $location.path('/products');
            }

            $scope.login = function() {
                $scope.error = '';
                $scope.success = '';
                $scope.loading = true;

                AuthService.login($scope.email, $scope.password)
                    .then(function(response) {
                        $scope.success = response.message || 'Login successful';
                        $location.path('/products');
                    })
                    .catch(function(error) {
                        $scope.error = (error.data && error.data.message) ? error.data.message : 'Login failed';
                    })
                    .finally(function() {
                        $scope.loading = false;
                    });
            };
        }]);

        app.controller('ProductsCtrl', ['$scope', '$http', 'AuthService', function($scope, $http, AuthService) {
            $scope.products = [];
            $scope.loading = true;
            $scope.error = '';

            $http.get(AuthService.apiUrl + '/products', {
                headers: AuthService.getHeaders()
            }).then(function(response) {
                $scope.products = response.data.data || response.data;
            }).catch(function(error) {
                $scope.error = (error.status === 401) ? 'Unauthorized. Please login again.' : 'Failed to load products';
                if (error.status === 401) AuthService.logout();
            }).finally(function() {
                $scope.loading = false;
            });
        }]);

        app.controller('DiscountsCtrl', ['$scope', '$http', 'AuthService', function($scope, $http, AuthService) {
            $scope.discounts = [];
            $scope.loading = true;
            $scope.error = '';

            $http.get(AuthService.apiUrl + '/discounts', {
                headers: AuthService.getHeaders()
            }).then(function(response) {
                $scope.discounts = response.data.data || response.data;
            }).catch(function(error) {
                $scope.error = (error.status === 401) ? 'Unauthorized. Please login again.' : 'Failed to load discounts';
                if (error.status === 401) AuthService.logout();
            }).finally(function() {
                $scope.loading = false;
            });
        }]);

        app.controller('CategoriesCtrl', ['$scope', '$http', 'AuthService', function($scope, $http, AuthService) {
            $scope.categories = [];
            $scope.loading = true;
            $scope.error = '';

            $http.get(AuthService.apiUrl + '/categories', {
                headers: AuthService.getHeaders()
            }).then(function(response) {
                $scope.categories = response.data.data || response.data;
            }).catch(function(error) {
                $scope.error = (error.status === 401) ? 'Unauthorized. Please login again.' : 'Failed to load categories';
                if (error.status === 401) AuthService.logout();
            }).finally(function() {
                $scope.loading = false;
            });
        }]);
    </script>
</body>
</html>
