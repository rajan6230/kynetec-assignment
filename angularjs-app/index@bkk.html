<!DOCTYPE html>
<html ng-app="KeyneticApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keynetic Assignment - Products & Discounts Manager</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .price-final { font-size: 1.15rem; font-weight: 700; color: #198754; }
        .navbar-brand { font-size: 1.6rem; }
        .card { border: 0; border-radius: 14px; }
        .shadow-soft { box-shadow: 0 8px 24px rgba(0,0,0,.08); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#/products">
                <i class="fas fa-store me-2"></i>Keynetic Manager
            </a>
            <div class="navbar-nav ms-auto" ng-controller="NavCtrl">
                <a class="nav-link" href="#/login" ng-if="!auth.isAuthenticated()">Login</a>
                <a class="nav-link" href="#/products" ng-if="auth.isAuthenticated()">Products</a>
                <a class="nav-link" href="#/discounts" ng-if="auth.isAuthenticated()">Discounts</a>
                <a class="nav-link" href="#/categories" ng-if="auth.isAuthenticated()">Categories</a>
                <button class="btn btn-outline-light ms-2" ng-if="auth.isAuthenticated()" ng-click="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div ng-view></div>
    </div>

    <script>
        var app = angular.module('KeyneticApp', ['ngRoute']);

        app.config(['$routeProvider', function($routeProvider) {
            $routeProvider
                .when('/login', {
                    template: `
                        <div class="row justify-content-center mt-5">
                            <div class="col-md-6 col-lg-4">
                                <div class="card shadow-soft">
                                    <div class="card-body p-5">
                                        <div class="text-center mb-4">
                                            <i class="fas fa-user-circle fa-3x text-primary mb-3"></i>
                                            <h3 class="mb-1">Login</h3>
                                            <p class="text-muted mb-0">Use seeded test account</p>
                                        </div>
                                        <form ng-submit="login()">
                                            <div class="mb-3">
                                                <label class="form-label">Email</label>
                                                <input type="email" class="form-control" ng-model="email" placeholder="admin@admin.com" required>
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label">Password</label>
                                                <input type="password" class="form-control" ng-model="password" placeholder="password" required>
                                            </div>
                                            <button type="submit" class="btn btn-primary w-100" ng-disabled="loading">
                                                <span ng-if="!loading"><i class="fas fa-sign-in-alt me-2"></i>Login</span>
                                                <span ng-if="loading"><i class="fas fa-spinner fa-spin me-2"></i>Logging in...</span>
                                            </button>
                                        </form>
                                        <div class="alert alert-danger mt-3" ng-if="error">{{error}}</div>
                                        <div class="alert alert-success mt-3" ng-if="success">{{success}}</div>
                                        <div class="mt-3 small text-muted">
                                            Test login: admin@admin.com / password
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `,
                    controller: 'LoginCtrl'
                })
                .when('/products', {
                    template: `
                        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                            <div>
                                <h2 class="mb-1">Products</h2>
                                <p class="text-muted mb-0">Product list from Laravel API</p>
                            </div>
                            <input type="text" class="form-control" style="max-width: 280px;" ng-model="search" placeholder="Search products">
                        </div>
                        <div ng-if="loading" class="text-center py-5">
                            <i class="fas fa-spinner fa-spin fa-2x text-primary mb-3"></i>
                            <p>Loading products...</p>
                        </div>
                        <div class="alert alert-danger" ng-if="error">{{error}}</div>
                        <div class="row" ng-if="!loading">
                            <div class="col-md-4 mb-4" ng-repeat="product in products | filter:search">
                                <div class="card shadow-soft h-100">
                                    <div class="card-body">
                                        <h5 class="card-title">{{product.name}}</h5>
                                        <p class="card-text text-muted">{{product.description || 'No description available'}}</p>
                                        <p class="mb-1"><strong>Base Price:</strong> ₹{{product.price}}</p>
                                        <p class="price-final mb-0">Final Price: ₹{{product.final_price || product.price}}</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `,
                    controller: 'ProductsCtrl'
                })
                .when('/discounts', {
                    template: `
                        <h2 class="mb-3">Discounts</h2>
                        <div ng-if="loading" class="text-center py-5"><i class="fas fa-spinner fa-spin fa-2x text-primary"></i></div>
                        <div class="alert alert-danger" ng-if="error">{{error}}</div>
                        <div class="row" ng-if="!loading">
                            <div class="col-md-4 mb-4" ng-repeat="discount in discounts">
                                <div class="card shadow-soft h-100">
                                    <div class="card-body">
                                        <h5>{{discount.title}}</h5>
                                        <p class="mb-1"><strong>Type:</strong> {{discount.type}}</p>
                                        <p class="mb-0"><strong>Value:</strong> {{discount.value}}</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `,
                    controller: 'DiscountsCtrl'
                })
                .when('/categories', {
                    template: `
                        <h2 class="mb-3">Categories</h2>
                        <div ng-if="loading" class="text-center py-5"><i class="fas fa-spinner fa-spin fa-2x text-primary"></i></div>
                        <div class="alert alert-danger" ng-if="error">{{error}}</div>
                        <div class="card shadow-soft" ng-if="!loading">
                            <div class="card-body">
                                <ul class="mb-0">
                                    <li ng-repeat="category in categories">
                                        <strong>{{category.name}}</strong>
                                        <ul ng-if="category.children && category.children.length">
                                            <li ng-repeat="child in category.children">{{child.name}}</li>
                                        </ul>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    `,
                    controller: 'CategoriesCtrl'
                })
                .otherwise({ redirectTo: '/login' });
        }]);

        app.factory('AuthService', ['$http', '$window', '$location', function($http, $window, $location) {
            var auth = {};
            auth.apiUrl = '/api';
            auth.token = $window.localStorage.getItem('token') || null;

            auth.login = function(email, password) {
                return $http.post(auth.apiUrl + '/login', {
                    email: email,
                    password: password
                }, {
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    }
                }).then(function(response) {
                    auth.token = response.data.token;
                    $window.localStorage.setItem('token', auth.token);
                    return response.data;
                });
            };

            auth.logout = function() {
                $window.localStorage.removeItem('token');
                auth.token = null;
                $location.path('/login');
            };

            auth.isAuthenticated = function() {
                return !!auth.token;
            };

            auth.getHeaders = function() {
                return {
                    'Authorization': 'Bearer ' + auth.token,
                    'Accept': 'application/json'
                };
            };

            return auth;
        }]);

        app.run(['$rootScope', '$location', 'AuthService', function($rootScope, $location, AuthService) {
            $rootScope.auth = AuthService;
            $rootScope.$on('$routeChangeStart', function(event, next) {
                var path = $location.path() || '/login';
                if (path !== '/login' && !AuthService.isAuthenticated()) {
                    event.preventDefault();
                    $location.path('/login');
                }
                if (path === '/login' && AuthService.isAuthenticated()) {
                    event.preventDefault();
                    $location.path('/products');
                }
            });
        }]);

        app.controller('NavCtrl', ['$scope', 'AuthService', function($scope, AuthService) {
            $scope.auth = AuthService;
            $scope.logout = function() {
                AuthService.logout();
            };
        }]);

        app.controller('LoginCtrl', ['$scope', 'AuthService', '$location', function($scope, AuthService, $location) {
            $scope.email = 'admin@admin.com';
            $scope.password = 'password';
            $scope.loading = false;

            if (AuthService.isAuthenticated()) {
                $location.path('/products');
            }

            $scope.login = function() {
                $scope.error = '';
                $scope.success = '';
                $scope.loading = true;

                AuthService.login($scope.email, $scope.password)
                    .then(function(response) {
                        $scope.success = response.message || 'Login successful';
                        $location.path('/products');
                    })
                    .catch(function(err) {
                        if (err.data && err.data.message) {
                            $scope.error = err.data.message;
                        } else {
                            $scope.error = 'Login failed';
                        }
                    })
                    .finally(function() {
                        $scope.loading = false;
                    });
            };
        }]);

        app.controller('ProductsCtrl', ['$scope', '$http', 'AuthService', function($scope, $http, AuthService) {
            $scope.products = [];
            $scope.loading = true;
            $scope.error = '';

            $http.get(AuthService.apiUrl + '/products', {
                headers: AuthService.getHeaders()
            }).then(function(response) {
                $scope.products = response.data.data || response.data;
            }).catch(function(error) {
                if (error.status === 401) {
                    AuthService.logout();
                } else {
                    $scope.error = 'Failed to load products';
                }
            }).finally(function() {
                $scope.loading = false;
            });
        }]);

        app.controller('DiscountsCtrl', ['$scope', '$http', 'AuthService', function($scope, $http, AuthService) {
            $scope.discounts = [];
            $scope.loading = true;
            $scope.error = '';

            $http.get(AuthService.apiUrl + '/discounts', {
                headers: AuthService.getHeaders()
            }).then(function(response) {
                $scope.discounts = response.data.data || response.data;
            }).catch(function(error) {
                if (error.status === 401) {
                    AuthService.logout();
                } else {
                    $scope.error = 'Failed to load discounts';
                }
            }).finally(function() {
                $scope.loading = false;
            });
        }]);

        app.controller('CategoriesCtrl', ['$scope', '$http', 'AuthService', function($scope, $http, AuthService) {
            $scope.categories = [];
            $scope.loading = true;
            $scope.error = '';

            $http.get(AuthService.apiUrl + '/categories', {
                headers: AuthService.getHeaders()
            }).then(function(response) {
                $scope.categories = response.data.data || response.data;
            }).catch(function(error) {
                if (error.status === 401) {
                    AuthService.logout();
                } else {
                    $scope.error = 'Failed to load categories';
                }
            }).finally(function() {
                $scope.loading = false;
            });
        }]);
    </script>
</body>
</html>
