<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5 text-center">
                <i class="fas fa-store fa-3x text-primary mb-4"></i>
                <h3 class="mb-4">Keynetic Manager</h3>
                <p class="text-muted mb-4">Login to continue</p>
                <form ng-submit="login()">
                    <div class="mb-4">
                        <input type="email" class="form-control form-control-lg" 
                               ng-model="email" placeholder="admin@admin.com" required>
                    </div>
                    <div class="mb-4">
                        <input type="password" class="form-control form-control-lg" 
                               ng-model="password" placeholder="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100" 
                            ng-disabled="loading">
                        <i class="fas" ng-class="loading ? 'fa-spinner fa-spin' : 'fa-sign-in-alt'"></i>
                        {{loading ? 'Logging in...' : 'Login'}}
                    </button>
                </form>
                <div ng-show="error" class="alert alert-danger mt-4">{{error}}</div>
                <div ng-show="success" class="alert alert-success mt-4">{{success}}</div>
            </div>
        </div>
    </div>
</div>
